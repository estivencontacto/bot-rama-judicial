<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centro de Monitoreo Judicial</title>
    <style>
      /* Paleta institucional inspirada en documentos legales: tinta, papel, verde y dorado sobrio. */
      :root {
        --ink: #14232b;
        --muted: #61717a;
        --line: #d9e2e3;
        --surface: #ffffff;
        --page: #f3f1eb;
        --nav: #142832;
        --nav-2: #213b46;
        --accent: #1f6a55;
        --accent-2: #2d8369;
        --gold: #b68a3c;
        --paper: #fbfaf6;
        --soft: #e9f0ed;
        --warn: #9a6d1d;
        --danger: #a3443c;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      /* Controles base compartidos por formularios, acciones y carga de archivos. */
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 12%, rgba(182, 138, 60, .12), transparent 28%),
          linear-gradient(135deg, #f7f5ef 0%, var(--page) 48%, #edf4f1 100%);
      }
      button, input, textarea, select { font: inherit; }
      button, .fileButton {
        min-height: 38px;
        border: 1px solid var(--nav);
        border-radius: 6px;
        background: var(--nav);
        color: white;
        padding: 0 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 10px 22px rgba(20, 40, 50, .12);
        transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      }
      button:hover, .fileButton:hover { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(20, 40, 50, .16); }
      button.secondary, .fileButton { background: white; color: var(--nav); box-shadow: 0 6px 16px rgba(20, 40, 50, .08); }
      button.ghost { background: transparent; color: inherit; border-color: transparent; }
      button:disabled { opacity: .55; cursor: wait; }
      input, textarea, select {
        min-height: 38px;
        border: 1px solid #cbd7da;
        border-radius: 6px;
        background: white;
        padding: 8px 10px;
        transition: border-color .18s ease, box-shadow .18s ease;
      }
      input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31, 106, 85, .12); outline: none; }
      textarea { width: 100%; min-height: 120px; resize: vertical; }
      a { color: var(--accent); }
      /* Pantalla de autenticacion: primera entrada al sistema comercial. */
      .login {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(320px, 460px) 1fr;
      }
      .loginForm {
        background: rgba(255, 255, 255, .92);
        padding: 44px;
        display: grid;
        align-content: center;
        gap: 16px;
        border-right: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }
      .loginForm h1 { margin: 0; font-size: 30px; }
      .loginAside {
        padding: 44px;
        display: grid;
        align-content: center;
        background:
          linear-gradient(135deg, rgba(20, 40, 50, .88), rgba(31, 106, 85, .78)),
          linear-gradient(45deg, #142832, #1f6a55);
        color: white;
        position: relative;
        overflow: hidden;
      }
      .loginAside::before {
        content: "§";
        position: absolute;
        right: 8%;
        bottom: 4%;
        color: rgba(255,255,255,.08);
        font-size: 220px;
        font-family: Georgia, serif;
        transform: rotate(-12deg);
      }
      .loginAside h2 { max-width: 680px; font-size: 42px; margin: 0 0 12px; }
      .loginAside p { max-width: 680px; color: #ddebe7; font-size: 18px; }
      /* Layout principal: navegacion lateral fija y area de trabajo. */
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
      }
      .sidebar {
        background: linear-gradient(180deg, var(--nav) 0%, var(--nav-2) 100%);
        color: white;
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        box-shadow: 18px 0 36px rgba(20, 40, 50, .12);
      }
      .brand { border-bottom: 1px solid rgba(255,255,255,.12); padding-bottom: 16px; }
      .brand h1 { margin: 0 0 4px; font-size: 19px; }
      .brand p { margin: 0; color: #b8c6ca; font-size: 13px; }
      .nav { display: grid; gap: 6px; }
      .nav button {
        border-color: transparent;
        background: transparent;
        text-align: left;
        justify-content: flex-start;
        color: #dce8eb;
        box-shadow: none;
      }
      .nav button.active { background: rgba(255,255,255,.13); color: white; border-color: rgba(182, 138, 60, .42); }
      .sidebarFooter { margin-top: auto; display: grid; gap: 8px; }
      /* Componentes de datos: metricas, paneles, tablas y estados. */
      .main { padding: 26px; display: grid; gap: 16px; align-content: start; animation: fadeIn .28s ease both; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
      .topbar h2 { margin: 0; font-size: 25px; }
      .muted { color: var(--muted); margin: 4px 0 0; }
      .grid { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 12px; }
      .metric, .panel {
        background: rgba(255, 255, 255, .92);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 42px rgba(20, 40, 50, .07);
      }
      .metric { padding: 15px; position: relative; overflow: hidden; }
      .metric::before { content: ""; position: absolute; inset: 0 0 auto; height: 3px; background: linear-gradient(90deg, var(--gold), var(--accent)); }
      .metric span { display: block; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0; }
      .metric strong { font-size: 28px; }
      .panel { padding: 16px; display: grid; gap: 13px; }
      .panel h3 { margin: 0; font-size: 17px; }
      .panelHeader { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .field { display: grid; gap: 6px; }
      .field span { color: var(--muted); font-size: 12px; font-weight: 650; text-transform: uppercase; }
      .helpBox {
        border: 1px solid #cfe0dc;
        background: #f2f8f6;
        border-radius: 8px;
        padding: 12px;
        display: grid;
        gap: 8px;
      }
      .helpBox p { margin: 0; color: #42535a; }
      .helpBox ol { margin: 0; padding-left: 18px; color: #42535a; display: grid; gap: 4px; }
      .actionPanel {
        background: linear-gradient(135deg, #ffffff 0%, #f4f1e8 46%, #edf7f3 100%);
        border-color: #cfe0dc;
      }
      .split { display: grid; grid-template-columns: 380px minmax(0, 1fr); gap: 16px; align-items: start; }
      .tableWrap { overflow: auto; }
      table { width: 100%; min-width: 920px; border-collapse: collapse; }
      th, td { border-bottom: 1px solid #e6ecee; padding: 11px; text-align: left; vertical-align: top; font-size: 13px; }
      th { color: var(--muted); font-weight: 650; background: #fbfaf6; position: sticky; top: 0; z-index: 1; }
      tr { transition: background .16s ease; }
      tbody tr:hover { background: #f7faf8; }
      .badge { display: inline-block; border-radius: 999px; padding: 4px 8px; font-size: 12px; background: #e7f2ed; color: var(--accent); }
      .badge.warn { background: #fff3d8; color: var(--warn); }
      .badge.error { background: #fde7e4; color: var(--danger); }
      .log { background: #142228; color: #dce9eb; border-radius: 6px; padding: 12px; min-height: 92px; white-space: pre-wrap; overflow: auto; }
      .progressCard { border-color: #bad7d0; background: #fbfdfc; }
      /* Barra de progreso del scraper para ejecuciones largas de Selenium. */
      .progressTrack {
        height: 14px;
        background: #dfe9e8;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid #cfdddc;
      }
      .progressFill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width .35s ease;
      }
      .progressFill.active {
        background-image: linear-gradient(90deg, var(--accent), var(--accent-2)), repeating-linear-gradient(45deg, rgba(255,255,255,.22) 0 10px, transparent 10px 20px);
        background-blend-mode: screen;
        animation: progressGlow 1.4s ease-in-out infinite alternate;
      }
      .progressMeta { display: grid; grid-template-columns: repeat(3, minmax(110px, 1fr)); gap: 10px; }
      .progressMeta div { background: var(--soft); border-radius: 8px; padding: 10px; }
      .progressMeta span { display: block; color: var(--muted); font-size: 12px; }
      .progressMeta strong { font-size: 18px; }
      .timeline { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
      .timeline li { border-left: 3px solid var(--accent); padding: 3px 0 3px 12px; }
      /* Drawer lateral para ver detalle e historial sin abandonar la tabla. */
      .drawer {
        position: fixed;
        inset: 0;
        display: none;
        background: rgba(12, 22, 27, .28);
        justify-content: flex-end;
      }
      .drawer.open { display: flex; }
      .drawerPanel {
        width: min(520px, 100vw);
        background: white;
        padding: 22px;
        overflow: auto;
        display: grid;
        gap: 14px;
        animation: slideIn .2s ease both;
      }
      .empty { padding: 18px; color: var(--muted); background: #f8faf9; border: 1px dashed var(--line); border-radius: 8px; }
      /* Animaciones discretas para dar feedback sin afectar lectura operativa. */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(22px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes progressGlow {
        from { filter: saturate(1); }
        to { filter: saturate(1.25) brightness(1.04); }
      }
      @media (max-width: 980px) {
        .login, .app, .split { grid-template-columns: 1fr; }
        .loginAside { display: none; }
        .grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
        .progressMeta { grid-template-columns: 1fr; }
        .sidebar { position: sticky; top: 0; z-index: 2; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="drawer" class="drawer" onclick="closeDrawer(event)"></div>
    <script>
      const API = "http://127.0.0.1:8000";
      // Estado central de la SPA. Se conserva lo minimo en localStorage para restaurar sesion y vista.
      const state = {
        token: localStorage.getItem("token") || "",
        refreshToken: localStorage.getItem("refresh_token") || "",
        view: localStorage.getItem("view") || "dashboard",
        busy: false,
        resumen: {},
        radicados: [],
        procesos: [],
        reportes: [],
        notificaciones: [],
        programacion: null,
        organizacion: null,
        me: null,
        usuarios: [],
        auditoria: [],
        consultas: [],
        activeConsulta: null,
        poller: null,
        selected: null,
        log: "Sistema listo. Carga radicados y ejecuta el scraper.",
        filtros: { radicado: "", juzgado: "", fecha: "", estado: "" },
      };
      const app = document.getElementById("app");
      const drawer = document.getElementById("drawer");

      // Renueva el access token cuando la sesion sigue viva por refresh token.
      async function refreshSession() {
        if (!state.refreshToken) return false;
        try {
          const data = await request("/auth/refresh", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refresh_token: state.refreshToken }),
          }, false);
          state.token = data.access_token;
          state.refreshToken = data.refresh_token || "";
          localStorage.setItem("token", state.token);
          localStorage.setItem("refresh_token", state.refreshToken);
          return true;
        } catch {
          localStorage.removeItem("token");
          localStorage.removeItem("refresh_token");
          state.token = "";
          state.refreshToken = "";
          render();
          return false;
        }
      }

      // Cliente HTTP con reintento automatico ante 401 para evitar cortes durante cargas y scraping.
      async function request(path, options = {}, retryAuth = true) {
        const response = await fetch(`${API}${path}`, options);
        const text = await response.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
        if (response.status === 401 && retryAuth && await refreshSession()) {
          const nextOptions = { ...options };
          nextOptions.headers = { ...(options.headers || {}), Authorization: `Bearer ${state.token}` };
          return request(path, nextOptions, false);
        }
        if (!response.ok) throw new Error(data.detail || text || "Error de solicitud");
        return data;
      }
      const headers = () => ({ Authorization: `Bearer ${state.token}` });
      const jsonHeaders = () => ({ ...headers(), "Content-Type": "application/json" });
      const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));

      // Utilidades de estado visual y navegacion.
      function setLog(message, payload) {
        state.log = payload ? `${message}\n${JSON.stringify(payload, null, 2)}` : message;
        render();
      }
      function setView(view) {
        state.view = view;
        localStorage.setItem("view", view);
        render();
      }
      // Autenticacion y cierre de sesion.
      async function login(event) {
        event.preventDefault();
        const form = new FormData(event.target);
        try {
          const data = await request("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: form.get("email"), password: form.get("password") }),
          });
          state.token = data.access_token;
          state.refreshToken = data.refresh_token || "";
          localStorage.setItem("token", state.token);
          localStorage.setItem("refresh_token", state.refreshToken);
          await refresh();
        } catch (error) {
          setLog(`No se pudo iniciar sesion: ${error.message}`);
        }
      }
      async function logout() {
        if (state.refreshToken) {
          try {
            await request("/auth/logout", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ refresh_token: state.refreshToken }),
            });
          } catch {}
        }
        localStorage.removeItem("token");
        localStorage.removeItem("refresh_token");
        state.token = "";
        state.refreshToken = "";
        render();
      }
      // Refresca todos los datos operativos del dashboard en paralelo.
      async function refresh() {
        if (!state.token) return render();
        try {
          const [me, resumen, radicados, procesos, reportes, notificaciones, consultas, programacion, organizacion, usuarios, auditoria] = await Promise.all([
            request("/auth/me", { headers: headers() }),
            request("/dashboard/resumen", { headers: headers() }),
            request("/radicados", { headers: headers() }),
            request("/procesos", { headers: headers() }),
            request("/reportes", { headers: headers() }),
            request("/notificaciones", { headers: headers() }),
            request("/consultas", { headers: headers() }),
            request("/programacion", { headers: headers() }),
            request("/admin/organizacion", { headers: headers() }),
            request("/admin/usuarios", { headers: headers() }),
            request("/admin/auditoria", { headers: headers() }),
          ]);
          Object.assign(state, { me, resumen, radicados, procesos, reportes, notificaciones, consultas, programacion, organizacion, usuarios, auditoria });
          render();
        } catch (error) {
          setLog(`Error cargando datos: ${error.message}`);
        }
      }
      // Carga manual de radicados desde texto pegado por el usuario.
      async function addManual() {
        const raw = document.getElementById("manualRadicados")?.value || "";
        const numeros = raw.split(/\r?\n|,|;/).map((x) => x.trim()).filter(Boolean);
        if (!numeros.length) return setLog("Agrega al menos un radicado.");
        try {
          const data = await request("/radicados", {
            method: "POST",
            headers: jsonHeaders(),
            body: JSON.stringify({ numeros }),
          });
          await refresh();
          setLog("Radicados agregados.", data);
        } catch (error) {
          setLog(`No se pudieron agregar radicados: ${error.message}`);
        }
      }
      // Carga masiva desde Excel con renovacion de sesion antes de enviar el archivo.
      async function uploadExcel(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (!state.token && !await refreshSession()) {
          event.target.value = "";
          return setLog("Tu sesion vencio. Inicia sesion de nuevo para cargar el Excel.");
        }
        const form = new FormData();
        form.append("file", file);
        try {
          const data = await request("/radicados/upload", { method: "POST", headers: headers(), body: form });
          await refresh();
          setLog("Excel cargado.", data);
        } catch (error) {
          setLog(`No se pudo cargar el Excel: ${error.message}`);
        } finally {
          event.target.value = "";
        }
      }
      // Descarga publica de la plantilla para reducir friccion antes de cargar datos.
      async function downloadTemplate() {
        try {
          const response = await fetch(`${API}/radicados/template`);
          if (!response.ok) throw new Error(await response.text() || "No se pudo descargar la plantilla");
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "listado_radicados_template.xlsx";
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          setLog("Plantilla descargada. Completa la columna Radicado y cargala desde esta pantalla.");
        } catch (error) {
          setLog(`No se pudo descargar la plantilla: ${error.message}`);
        }
      }
      // Ejecuta el scraper en segundo plano y abre el seguimiento por polling.
      async function executeScraper() {
        state.busy = true;
        setLog("Encolando consulta. El scraper correra en segundo plano.");
        try {
          const data = await request("/consultas/ejecutar", {
            method: "POST",
            headers: jsonHeaders(),
            body: JSON.stringify({}),
          });
          state.activeConsulta = data;
          startPolling(data.consulta_id);
          await refresh();
          setLog("Consulta iniciada. Puedes seguir usando el panel mientras Selenium trabaja.", data);
        } catch (error) {
          setLog(`Fallo la consulta: ${error.message}`);
          state.busy = false;
          render();
        }
      }
      // Consulta el avance de una ejecucion activa hasta completarse o fallar.
      function startPolling(consultaId) {
        if (state.poller) clearInterval(state.poller);
        state.poller = setInterval(async () => {
          try {
            const data = await request(`/consultas/${consultaId}`, { headers: headers() });
            state.activeConsulta = data;
            state.busy = ["pendiente", "ejecutando"].includes(data.estado);
            if (!state.busy) {
              clearInterval(state.poller);
              state.poller = null;
              await refresh();
              setLog("Consulta finalizada.", data);
            } else {
              render();
            }
          } catch (error) {
            clearInterval(state.poller);
            state.poller = null;
            state.busy = false;
            setLog(`No se pudo consultar el progreso: ${error.message}`);
          }
        }, 2000);
      }
      // Renderiza la tarjeta de avance de Selenium.
      function renderProgress() {
        const c = state.activeConsulta;
        if (!c) return "";
        const progreso = c.progreso ?? (c.total_radicados ? Math.round((c.total_procesados / c.total_radicados) * 100) : 0);
        const active = ["pendiente", "ejecutando"].includes(c.estado);
        return `
          <div class="panel progressCard">
            <div class="panelHeader">
              <div>
                <h3>Scraper en ejecucion</h3>
                <p class="muted">Consulta #${c.consulta_id} ${active ? "procesando radicados" : "finalizada"}</p>
              </div>
              <div class="row">
                ${statusBadge(c.estado, active ? "warn" : "")}
                ${statusBadge(`${Math.min(progreso, 100)}%`)}
              </div>
            </div>
            <div class="progressTrack">
              <div class="progressFill ${active ? "active" : ""}" style="width: ${Math.min(progreso, 100)}%"></div>
            </div>
            <div class="progressMeta">
              <div><span>Procesados</span><strong>${c.total_procesados || 0}/${c.total_radicados || 0}</strong></div>
              <div><span>Novedades</span><strong>${c.total_novedades || 0}</strong></div>
              <div><span>Errores</span><strong>${c.total_errores || 0}</strong></div>
            </div>
            <p class="muted">${esc(c.ultimo_mensaje || "Esperando estado...")}</p>
          </div>
        `;
      }
      function renderConsultasTable() {
        if (!state.consultas.length) return `<div class="empty">Sin ejecuciones registradas todavia.</div>`;
        return `
          <div class="tableWrap">
            <table>
              <thead><tr><th>ID</th><th>Estado</th><th>Progreso</th><th>Novedades</th><th>Errores</th><th>Mensaje</th></tr></thead>
              <tbody>${state.consultas.map((c) => `<tr><td>${c.consulta_id}</td><td>${statusBadge(c.estado)}</td><td>${c.total_procesados}/${c.total_radicados}</td><td>${c.total_novedades}</td><td>${c.total_errores}</td><td>${esc(c.ultimo_mensaje || "")}</td></tr>`).join("")}</tbody>
            </table>
          </div>
        `;
      }
      // Guarda la configuracion de Telegram sin exponer el token completo al cliente.
      async function saveTelegram(event) {
        event.preventDefault();
        const form = new FormData(event.target);
        try {
          const data = await request("/notificaciones", {
            method: "PUT",
            headers: jsonHeaders(),
            body: JSON.stringify({
              canal: "telegram",
              destino: form.get("destino"),
              bot_token: form.get("bot_token"),
              habilitada: form.get("habilitada") === "on",
            }),
          });
          await refresh();
          setLog("Configuracion de Telegram guardada.", data);
        } catch (error) {
          setLog(`No se pudo guardar Telegram: ${error.message}`);
        }
      }
      async function testTelegram() {
        try {
          const data = await request("/notificaciones/test", { method: "POST", headers: headers() });
          setLog("Prueba de Telegram enviada.", data);
        } catch (error) {
          setLog(`No se pudo enviar la prueba: ${error.message}`);
        }
      }
      // Configura consultas recurrentes para operar sin intervencion manual.
      async function saveProgramacion(event) {
        event.preventDefault();
        const form = new FormData(event.target);
        try {
          const data = await request("/programacion", {
            method: "PUT",
            headers: jsonHeaders(),
            body: JSON.stringify({
              habilitada: form.get("habilitada") === "on",
              intervalo_horas: Number(form.get("intervalo_horas") || 24),
            }),
          });
          await refresh();
          setLog("Programacion guardada.", data);
        } catch (error) {
          setLog(`No se pudo guardar programacion: ${error.message}`);
        }
      }
      // Cambia la password del usuario autenticado.
      async function changePassword(event) {
        event.preventDefault();
        const form = new FormData(event.target);
        try {
          await request("/auth/change-password", {
            method: "POST",
            headers: jsonHeaders(),
            body: JSON.stringify({
              current_password: form.get("current_password"),
              new_password: form.get("new_password"),
            }),
          });
          event.target.reset();
          setLog("Password actualizada correctamente.");
        } catch (error) {
          setLog(`No se pudo cambiar password: ${error.message}`);
        }
      }
      // Ajustes administrativos de la organizacion comercial.
      async function saveOrganizacion(event) {
        event.preventDefault();
        const form = new FormData(event.target);
        try {
          const data = await request("/admin/organizacion", {
            method: "PUT",
            headers: jsonHeaders(),
            body: JSON.stringify({
              nombre: form.get("nombre"),
              limite_radicados: Number(form.get("limite_radicados") || 500),
              activa: form.get("activa") === "on",
            }),
          });
          await refresh();
          setLog("Organizacion actualizada.", data);
        } catch (error) {
          setLog(`No se pudo guardar la organizacion: ${error.message}`);
        }
      }
      // Alta de usuarios por rol para separar operacion y lectura.
      async function createUsuario(event) {
        event.preventDefault();
        const form = new FormData(event.target);
        try {
          const data = await request("/admin/usuarios", {
            method: "POST",
            headers: jsonHeaders(),
            body: JSON.stringify({
              email: form.get("email"),
              nombre: form.get("nombre"),
              password: form.get("password"),
              rol: form.get("rol"),
            }),
          });
          event.target.reset();
          await refresh();
          setLog("Usuario creado.", data);
        } catch (error) {
          setLog(`No se pudo crear el usuario: ${error.message}`);
        }
      }
      // Abre el detalle normalizado del proceso y su historial.
      async function openProceso(radicado) {
        try {
          state.selected = await request(`/procesos/${encodeURIComponent(radicado)}`, { headers: headers() });
          renderDrawer();
        } catch (error) {
          setLog(`No se pudo abrir el detalle: ${error.message}`);
        }
      }
      function closeDrawer(event) {
        if (!event || event.target === drawer || event.target.dataset.close) {
          drawer.classList.remove("open");
          state.selected = null;
        }
      }
      // Filtros locales para exploracion rapida de procesos.
      function filteredProcesos() {
        return state.procesos.filter((item) => (
          item.radicado.toLowerCase().includes(state.filtros.radicado.toLowerCase()) &&
          (item.juzgado || "").toLowerCase().includes(state.filtros.juzgado.toLowerCase()) &&
          (!state.filtros.fecha || item.fecha_ultima_actuacion === state.filtros.fecha) &&
          (!state.filtros.estado || item.estado === state.filtros.estado)
        ));
      }
      // Componentes HTML pequenos compartidos por las vistas.
      function metric(label, value, tone = "") {
        return `<article class="metric"><span>${label}</span><strong>${value ?? 0}</strong></article>`;
      }
      function navButton(view, label) {
        return `<button class="${state.view === view ? "active" : ""}" onclick="setView('${view}')">${label}</button>`;
      }
      function statusBadge(text, type = "") {
        return `<span class="badge ${type}">${esc(text)}</span>`;
      }
      // Vistas principales de la aplicacion.
      function renderLogin() {
        app.innerHTML = `
          <main class="login">
            <form class="loginForm" onsubmit="login(event)">
              <div>
                <h1>Centro de Monitoreo Judicial</h1>
                <p class="muted">Operacion del scraper, novedades y Telegram en un solo lugar.</p>
              </div>
              <input name="email" type="email" value="admin@example.com" required />
              <input name="password" type="password" value="admin123" required />
              <button>Ingresar</button>
              <pre class="log">${esc(state.log)}</pre>
            </form>
            <section class="loginAside">
              <h2>Consulta radicados, detecta cambios y notifica actuaciones sin revisar manualmente.</h2>
              <p>Disenado para operar como scraper comercial: carga de Excel, ejecucion controlada, historial, reportes y Telegram.</p>
            </section>
          </main>
        `;
      }
      function renderShell(content, title, subtitle) {
        app.innerHTML = `
          <main class="app">
            <aside class="sidebar">
              <div class="brand">
                <h1>Monitoreo Judicial</h1>
                <p>${esc(state.me?.organizacion || "Scraper + Telegram + reportes")}</p>
              </div>
              <nav class="nav">
                ${navButton("dashboard", "Resumen")}
                ${navButton("radicados", "Radicados")}
                ${navButton("procesos", "Procesos")}
                ${navButton("reportes", "Reportes")}
                ${navButton("config", "Configuracion")}
                ${navButton("admin", "Admin")}
              </nav>
              <div class="sidebarFooter">
                <p class="muted" style="color:#b8c6ca">${esc(state.me?.nombre || "")}<br>${esc(state.me?.rol || "")}</p>
                <button onclick="executeScraper()" ${state.busy ? "disabled" : ""}>Ejecutar scraper</button>
                <button class="secondary" onclick="refresh()">Actualizar</button>
                <button class="ghost" onclick="logout()">Cerrar sesion</button>
              </div>
            </aside>
            <section class="main">
              <header class="topbar">
                <div>
                  <h2>${esc(title)}</h2>
                  <p class="muted">${esc(subtitle)}</p>
                </div>
                <a href="${API}/docs" target="_blank">API</a>
              </header>
              ${content}
            </section>
          </main>
        `;
      }
      function renderDashboard() {
        const r = state.resumen || {};
        renderShell(`
          <section class="grid">
            ${metric("Radicados", r.total_radicados)}
            ${metric("Procesos", r.total_procesos)}
            ${metric("Consultas", r.total_consultas)}
            ${metric("Errores", r.total_errores)}
            ${metric("Telegram", r.notificaciones_activas)}
          </section>
          <section class="split">
            <div class="panel actionPanel">
              <div class="panelHeader">
                <div>
                  <h3>Ejecucion del scraper</h3>
                  <p class="muted">Lanza una consulta manual cuando quieras buscar novedades.</p>
                </div>
                ${state.busy ? statusBadge("En proceso", "warn") : statusBadge("Listo")}
              </div>
              <p class="muted">Lanza el scraper cuando quieras buscar novedades. Si hay cambios, se guardan en historial y se envian por Telegram.</p>
              <div class="row">
                <button onclick="executeScraper()" ${state.busy ? "disabled" : ""}>Ejecutar scraper ahora</button>
                <button class="secondary" onclick="setView('radicados')">Cargar radicados</button>
                <button class="secondary" onclick="setView('config')">Configurar Telegram</button>
              </div>
              <pre class="log">${esc(state.log)}</pre>
            </div>
            <div class="panel">
              <h3>Ultimos procesos</h3>
              ${renderProcesosTable(state.procesos.slice(0, 6), true)}
            </div>
          </section>
          ${renderProgress()}
          <section class="panel">
            <h3>Ultimas ejecuciones</h3>
            ${renderConsultasTable()}
          </section>
        `, "Resumen operativo", "Estado general del monitoreo y ejecucion del scraper.");
      }
      function renderRadicados() {
        renderShell(`
          <section class="split">
            <div class="panel">
              <div class="panelHeader">
                <div>
                  <h3>Cargar radicados</h3>
                  <p class="muted">Carga masiva desde Excel o pega los numeros manualmente.</p>
                </div>
                <button class="secondary" onclick="downloadTemplate()">Descargar plantilla</button>
              </div>
              <textarea id="manualRadicados" placeholder="Pega radicados, uno por linea"></textarea>
              <div class="row">
                <button onclick="addManual()">Agregar</button>
                <label class="fileButton">Cargar Excel<input type="file" accept=".xlsx,.xls" onchange="uploadExcel(event)" hidden /></label>
              </div>
              <div class="helpBox">
                <p><strong>Formato recomendado:</strong> usa la plantilla listado_radicados_template.xlsx y completa la columna Radicado.</p>
                <p>El sistema ignora duplicados y deja listos los radicados para la siguiente ejecucion del scraper.</p>
              </div>
              <pre class="log">${esc(state.log)}</pre>
            </div>
            <div class="panel">
              <h3>Radicados activos (${state.radicados.length})</h3>
              <div class="tableWrap">
                <table>
                  <thead><tr><th>Radicado</th><th>Estado</th><th>Creado</th></tr></thead>
                  <tbody>${state.radicados.map((r) => `<tr><td>${esc(r.numero)}</td><td>${statusBadge(r.activo ? "Activo" : "Inactivo")}</td><td>${new Date(r.created_at).toLocaleString()}</td></tr>`).join("") || `<tr><td colspan="3"><div class="empty">Todavia no hay radicados cargados.</div></td></tr>`}</tbody>
                </table>
              </div>
            </div>
          </section>
        `, "Radicados", "Carga manual o por Excel los procesos que quieres monitorear.");
      }
      function renderProcesosTable(items, compact = false) {
        if (!items.length) return `<div class="empty">No hay procesos consultados todavia.</div>`;
        return `
          <div class="tableWrap">
            <table>
              <thead><tr><th>Radicado</th><th>Juzgado</th><th>Partes</th><th>Ultima actuacion</th><th>Estado</th><th></th></tr></thead>
              <tbody>${items.map((p) => `
                <tr>
                  <td>${esc(p.radicado)}</td>
                  <td>${esc(p.juzgado || "No identificado")}</td>
                  <td>${esc(compact ? (p.partes || "No identificadas").slice(0, 80) : (p.partes || "No identificadas"))}</td>
                  <td>${esc(p.fecha_ultima_actuacion || "Sin fecha")}</td>
                  <td>${statusBadge(p.estado || "monitoreado")}</td>
                  <td><button class="secondary" onclick="openProceso('${esc(p.radicado)}')">Ver</button></td>
                </tr>
              `).join("")}</tbody>
            </table>
          </div>
        `;
      }
      function renderProcesos() {
        const procesos = filteredProcesos();
        renderShell(`
          <section class="panel">
            <div class="row">
              <input placeholder="Radicado" value="${esc(state.filtros.radicado)}" oninput="state.filtros.radicado=this.value; render()" />
              <input placeholder="Juzgado" value="${esc(state.filtros.juzgado)}" oninput="state.filtros.juzgado=this.value; render()" />
              <input type="date" value="${esc(state.filtros.fecha)}" oninput="state.filtros.fecha=this.value; render()" />
              <select onchange="state.filtros.estado=this.value; render()">
                <option value="">Todos</option>
                <option value="monitoreado" ${state.filtros.estado === "monitoreado" ? "selected" : ""}>Monitoreado</option>
              </select>
            </div>
            ${renderProcesosTable(procesos)}
          </section>
        `, "Procesos", "Consulta, filtra y abre el historial de cada proceso monitoreado.");
      }
      function renderReportes() {
        renderShell(`
          <section class="panel">
            <h3>Reportes Excel</h3>
            <div class="tableWrap">
              <table>
                <thead><tr><th>Archivo</th><th>Procesos</th><th>Errores</th><th>Creado</th><th></th></tr></thead>
                <tbody>${state.reportes.map((r) => `<tr><td>${esc(r.nombre_archivo)}</td><td>${r.total_procesos}</td><td>${r.total_errores}</td><td>${new Date(r.created_at).toLocaleString()}</td><td><a href="${API}/reportes/${r.id}/download">Descargar</a></td></tr>`).join("") || `<tr><td colspan="5"><div class="empty">Ejecuta el scraper para generar reportes.</div></td></tr>`}</tbody>
              </table>
            </div>
          </section>
        `, "Reportes", "Descarga los Excel generados por cada ejecucion.");
      }
      function renderConfig() {
        const telegram = state.notificaciones.find((n) => n.canal === "telegram") || {};
        const programacion = state.programacion || {};
        renderShell(`
          <section class="split">
            <form class="panel" onsubmit="changePassword(event)">
              <h3>Mi cuenta</h3>
              <p class="muted">${esc(state.me?.email || "")}</p>
              <input name="current_password" type="password" placeholder="Password actual" required />
              <input name="new_password" type="password" placeholder="Nueva password" minlength="8" required />
              <button>Cambiar password</button>
            </form>
            <form class="panel" onsubmit="saveTelegram(event)">
              <div class="panelHeader">
                <div>
                  <h3>Telegram</h3>
                  <p class="muted">Configura el bot que enviara nuevas actuaciones y resumenes de consulta.</p>
                </div>
                ${telegram.bot_token_configurado ? statusBadge("Token guardado") : statusBadge("Sin token", "warn")}
              </div>
              <label class="field">
                <span>Token del bot</span>
                <input name="bot_token" type="password" placeholder="${telegram.bot_token_configurado ? "Deja vacio para conservar el token actual" : "Ej: 123456:ABC-DEF..."}" ${telegram.bot_token_configurado ? "" : "required"} autocomplete="off" />
              </label>
              <label class="field">
                <span>Chat ID</span>
                <input name="destino" placeholder="Ej: 123456789 o -1001234567890" value="${esc(telegram.destino || "")}" required />
              </label>
              <label class="row"><input name="habilitada" type="checkbox" ${telegram.habilitada ? "checked" : ""} /> Habilitar notificaciones</label>
              <div class="helpBox">
                <p><strong>De donde sale esta informacion:</strong></p>
                <ol>
                  <li>En Telegram abre <strong>@BotFather</strong>, crea un bot con <strong>/newbot</strong> y copia el token.</li>
                  <li>Escribe cualquier mensaje a tu bot desde el chat donde quieres recibir alertas.</li>
                  <li>Abre <strong>https://api.telegram.org/botTOKEN/getUpdates</strong> reemplazando TOKEN por el token real y copia el valor <strong>chat.id</strong>.</li>
                </ol>
                <p>Despues de guardar, usa <strong>Probar Telegram</strong> para confirmar que el bot puede enviar mensajes.</p>
              </div>
              <div class="row">
                <button>Guardar</button>
                <button type="button" class="secondary" onclick="testTelegram()">Probar Telegram</button>
              </div>
            </form>
            <div class="panel">
              <h3>Programacion automatica</h3>
              <p class="muted">Activa consultas recurrentes para que el sistema trabaje sin presionar el boton manualmente.</p>
              <form onsubmit="saveProgramacion(event)" class="panel" style="border: 0; padding: 0">
                <label class="row"><input name="habilitada" type="checkbox" ${programacion.habilitada ? "checked" : ""} /> Activar consultas programadas</label>
                <label>Intervalo en horas
                  <input name="intervalo_horas" type="number" min="1" max="168" value="${esc(programacion.intervalo_horas || 24)}" />
                </label>
                <p class="muted">Proxima ejecucion: ${programacion.proxima_ejecucion ? new Date(programacion.proxima_ejecucion).toLocaleString() : "No programada"}</p>
                <button>Guardar programacion</button>
              </form>
            </div>
          </section>
          <section class="panel">
            <h3>Formato de mensaje</h3>
              <pre class="log">--------------------
NUEVA ACTUACION DETECTADA

Radicado: 05001400303220230015700
Juzgado: JUZGADO 004 CIVIL MUNICIPAL
Demandante: AVACREDITOS SA
Demandado: JAIME ANDRES GAVIRIA ESCOBAR
Fecha ultima actuacion: 2025-09-18</pre>
          </section>
        `, "Configuracion", "Ajustes del canal de notificacion y pruebas operativas.");
      }
      function renderAdmin() {
        const org = state.organizacion || {};
        renderShell(`
          <section class="split">
            <form class="panel" onsubmit="saveOrganizacion(event)">
              <h3>Organizacion</h3>
              <label>Nombre
                <input name="nombre" value="${esc(org.nombre || "Organizacion Demo")}" required />
              </label>
              <label>Limite de radicados
                <input name="limite_radicados" type="number" min="1" max="100000" value="${esc(org.limite_radicados || 500)}" />
              </label>
              <label class="row"><input name="activa" type="checkbox" ${org.activa !== false ? "checked" : ""} /> Organizacion activa</label>
              <button>Guardar organizacion</button>
            </form>
            <form class="panel" onsubmit="createUsuario(event)">
              <h3>Crear usuario</h3>
              <input name="nombre" placeholder="Nombre" required />
              <input name="email" type="email" placeholder="Email" required />
              <input name="password" type="password" placeholder="Password minimo 8 caracteres" required />
              <select name="rol">
                <option value="operador">Operador</option>
                <option value="lectura">Lectura</option>
                <option value="admin">Admin</option>
              </select>
              <button>Crear usuario</button>
            </form>
          </section>
          <section class="panel">
            <h3>Usuarios</h3>
            <div class="tableWrap">
              <table>
                <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th>Creado</th></tr></thead>
                <tbody>${state.usuarios.map((u) => `<tr><td>${esc(u.nombre)}</td><td>${esc(u.email)}</td><td>${statusBadge(u.rol)}</td><td>${u.is_active ? "Activo" : "Inactivo"}</td><td>${new Date(u.created_at).toLocaleString()}</td></tr>`).join("") || `<tr><td colspan="5"><div class="empty">Sin usuarios.</div></td></tr>`}</tbody>
              </table>
            </div>
          </section>
          <section class="panel">
            <h3>Auditoria</h3>
            <div class="tableWrap">
              <table>
                <thead><tr><th>Fecha</th><th>Accion</th><th>Entidad</th><th>Descripcion</th></tr></thead>
                <tbody>${state.auditoria.map((a) => `<tr><td>${new Date(a.created_at).toLocaleString()}</td><td>${esc(a.accion)}</td><td>${esc(a.entidad || "")}</td><td>${esc(a.descripcion)}</td></tr>`).join("") || `<tr><td colspan="4"><div class="empty">Sin eventos de auditoria.</div></td></tr>`}</tbody>
              </table>
            </div>
          </section>
        `, "Administracion", "Organizacion, usuarios, roles y auditoria operativa.");
      }
      function renderDrawer() {
        const p = state.selected;
        if (!p) return;
        drawer.innerHTML = `
          <aside class="drawerPanel">
            <div class="row" style="justify-content: space-between">
              <h2>${esc(p.radicado)}</h2>
              <button class="secondary" data-close="1">Cerrar</button>
            </div>
            <div class="panel">
              <h3>Informacion del proceso</h3>
              <p><strong>Juzgado:</strong> ${esc(p.juzgado || "No identificado")}</p>
              <p><strong>Demandante:</strong> ${esc(p.demandante || "No identificado")}</p>
              <p><strong>Demandado:</strong> ${esc(p.demandado || "No identificado")}</p>
              <p><strong>Ultima actuacion:</strong> ${esc(p.fecha_ultima_actuacion || "Sin fecha")}</p>
            </div>
            <div class="panel">
              <h3>Historial</h3>
              <ul class="timeline">${(p.historial || []).map((h) => `<li><strong>${esc(h.fecha || "Sin fecha")}</strong><br>${esc(h.titulo)}<br><span class="muted">${esc(h.descripcion || "")}</span></li>`).join("") || `<li>Sin historial registrado.</li>`}</ul>
            </div>
          </aside>
        `;
        drawer.classList.add("open");
      }
      function render() {
        if (!state.token) return renderLogin();
        if (state.view === "radicados") return renderRadicados();
        if (state.view === "procesos") return renderProcesos();
        if (state.view === "reportes") return renderReportes();
        if (state.view === "config") return renderConfig();
        if (state.view === "admin") return renderAdmin();
        return renderDashboard();
      }
      render();
      if (state.token) refresh();
    </script>
  </body>
</html>

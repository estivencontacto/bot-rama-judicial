<svg width="1200" height="650" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Demo del flujo del Centro de Monitoreo Judicial">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5ef"/>
      <stop offset="55%" stop-color="#f3f1eb"/>
      <stop offset="100%" stop-color="#e8f1ee"/>
    </linearGradient>
    <linearGradient id="nav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142832"/>
      <stop offset="100%" stop-color="#213b46"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6a55"/>
      <stop offset="100%" stop-color="#2d8369"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#142832" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1200" height="650" fill="url(#bg)"/>
  <rect x="38" y="38" width="1124" height="574" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="38" y="38" width="238" height="574" rx="18" fill="url(#nav)"/>
  <rect x="258" y="38" width="20" height="574" fill="#213b46"/>

  <text x="72" y="92" fill="#ffffff" font-family="Segoe UI, Arial" font-size="24" font-weight="700">Monitoreo Judicial</text>
  <text x="72" y="122" fill="#b8c6ca" font-family="Segoe UI, Arial" font-size="14">Scraper, reportes y Telegram</text>
  <line x1="72" y1="148" x2="232" y2="148" stroke="#ffffff" stroke-opacity=".16"/>
  <rect x="68" y="178" width="170" height="42" rx="8" fill="#ffffff" fill-opacity=".14" stroke="#b68a3c" stroke-opacity=".55"/>
  <text x="92" y="204" fill="#ffffff" font-family="Segoe UI, Arial" font-size="15">Resumen</text>
  <text x="92" y="258" fill="#dce8eb" font-family="Segoe UI, Arial" font-size="15">Radicados</text>
  <text x="92" y="314" fill="#dce8eb" font-family="Segoe UI, Arial" font-size="15">Procesos</text>
  <text x="92" y="370" fill="#dce8eb" font-family="Segoe UI, Arial" font-size="15">Reportes</text>
  <text x="92" y="426" fill="#dce8eb" font-family="Segoe UI, Arial" font-size="15">Configuracion</text>

  <text x="316" y="92" fill="#14232b" font-family="Segoe UI, Arial" font-size="32" font-weight="700">Dashboard operativo</text>
  <text x="316" y="124" fill="#61717a" font-family="Segoe UI, Arial" font-size="16">Carga masiva, ejecucion del scraper y notificaciones en un solo flujo.</text>

  <g font-family="Segoe UI, Arial">
    <rect x="316" y="156" width="162" height="96" rx="10" fill="#fbfaf6" stroke="#d9e2e3"/>
    <rect x="316" y="156" width="162" height="4" fill="#b68a3c"/>
    <text x="338" y="190" fill="#61717a" font-size="13">Radicados</text>
    <text x="338" y="226" fill="#14232b" font-size="34" font-weight="700">248</text>

    <rect x="500" y="156" width="162" height="96" rx="10" fill="#fbfaf6" stroke="#d9e2e3"/>
    <rect x="500" y="156" width="162" height="4" fill="#1f6a55"/>
    <text x="522" y="190" fill="#61717a" font-size="13">Procesos</text>
    <text x="522" y="226" fill="#14232b" font-size="34" font-weight="700">231</text>

    <rect x="684" y="156" width="162" height="96" rx="10" fill="#fbfaf6" stroke="#d9e2e3"/>
    <rect x="684" y="156" width="162" height="4" fill="#b68a3c"/>
    <text x="706" y="190" fill="#61717a" font-size="13">Novedades</text>
    <text x="706" y="226" fill="#14232b" font-size="34" font-weight="700">17</text>

    <rect x="868" y="156" width="162" height="96" rx="10" fill="#fbfaf6" stroke="#d9e2e3"/>
    <rect x="868" y="156" width="162" height="4" fill="#1f6a55"/>
    <text x="890" y="190" fill="#61717a" font-size="13">Telegram</text>
    <text x="890" y="226" fill="#14232b" font-size="34" font-weight="700">Activo</text>
  </g>

  <rect x="316" y="286" width="470" height="216" rx="12" fill="#ffffff" stroke="#d9e2e3"/>
  <text x="342" y="328" fill="#14232b" font-family="Segoe UI, Arial" font-size="20" font-weight="700">Ejecucion del scraper</text>
  <text x="342" y="356" fill="#61717a" font-family="Segoe UI, Arial" font-size="15">Selenium consulta la Rama Judicial en segundo plano.</text>
  <rect x="342" y="386" width="390" height="16" rx="8" fill="#dfe9e8"/>
  <rect x="342" y="386" width="292" height="16" rx="8" fill="url(#accent)"/>
  <text x="342" y="432" fill="#14232b" font-family="Segoe UI, Arial" font-size="16" font-weight="700">183/248 procesados</text>
  <text x="342" y="462" fill="#61717a" font-family="Segoe UI, Arial" font-size="15">Detecta nuevas actuaciones, guarda historial y genera Excel.</text>

  <rect x="820" y="286" width="300" height="216" rx="12" fill="#f2f8f6" stroke="#cfe0dc"/>
  <text x="846" y="328" fill="#14232b" font-family="Segoe UI, Arial" font-size="20" font-weight="700">Telegram</text>
  <rect x="846" y="352" width="248" height="112" rx="10" fill="#ffffff" stroke="#d9e2e3"/>
  <text x="866" y="384" fill="#14232b" font-family="Segoe UI, Arial" font-size="15" font-weight="700">NUEVA ACTUACION DETECTADA</text>
  <text x="866" y="414" fill="#14232b" font-family="Segoe UI, Arial" font-size="14">Radicado: 0500140030...</text>
  <text x="866" y="438" fill="#14232b" font-family="Segoe UI, Arial" font-size="14">Juzgado: Juzgado Civil</text>
  <text x="866" y="462" fill="#14232b" font-family="Segoe UI, Arial" font-size="14">Fecha ultima actuacion: 2026-06-04</text>

  <rect x="316" y="536" width="804" height="32" rx="16" fill="#142832"/>
  <text x="356" y="558" fill="#ffffff" font-family="Segoe UI, Arial" font-size="15">Flujo comercial: Excel de radicados -> Scraper headless -> PostgreSQL -> Dashboard -> Telegram y reportes</text>
</svg>
